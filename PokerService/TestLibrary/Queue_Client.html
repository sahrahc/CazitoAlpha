<!doctype html>
<html>
    <head>
        <title>Test STOMP connections</title>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
        <!-- using non-remote versions for dev in case no internet access 
        <script src="http://ajax.googleapis.com/ajax/libs/jquery/1.6.2/jquery.min.js"></script>
        <script src="http://cdn.sockjs.org/sockjs-0.3.min.js"></script>
        -->
        <script src="../../Libraries/jQuery/js/jquery-1.7.2.min.js" type="text/javascript"></script>
        <script src="../../Libraries/Messaging/sockjs-0.3.min.js"></script>
        <script src="../../Libraries/Messaging/Stomp.js" type="text/javascript"></script>
    </head>
    <body>
        <p>You are connected to server and receiving message as user2</p>
        <p>There should be one message received for every time Queue_Server is executed.</p>
        <br/>
        <p>Click on button below to send message to casino table. Run Queue_Server_Receive.php to verify</p>
        <input type="submit" value="Test Send" onclick="sendMessage();" />
        <p id="outputId">Output:</p>
        <script>
            function O(obj) {
                if (typeof obj == 'object')
                    return obj;
                else
                    return document.getElementById(obj);
            }


            Stomp.WebSocketClass = SockJS;
            var client = Stomp.client('http://127.0.0.1:55674/stomp');

            error_callback = function(error) {
                alert(error);
            };

            message_callback = function(message) {
                if (message.body) {
                    O("outputId").innerHTML = O("outputId").innerHTML + message + "<br />";
                }
                else {
                    O("outputId").innerHTML = O("outputId").innerHTML + "Got Empty Message. <br />";
                }
            };

            connect_callback = function(data) {
                O("outputId").innerHTML = "Connected to queue... <br />";

                client.subscribe("/queue/user2", message_callback);

                /*client.disconnect(function() {
                 O("outputId").innerHTML = O("outputId").innerHTML + "Disconnected.. \n";
                 }); */
            }

            client.connect('guest', 'guest', connect_callback, error_callback, '/');
            O("outputId").innerHTML = O("outputId").innerHTML + '\n Log started...'

        var currentDate = new Date();
            function sendMessage() {
                // format: client.connect(login, passcode, connect_callback, error_callback);
                client.send('/queue/table1', {}, '***test sending from browser to table at ' + currentDate.getTime());
            }
        </script>
    </body>
</html>
