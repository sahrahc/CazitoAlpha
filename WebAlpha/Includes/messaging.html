<div id="region-messaging" class="region">
    <!-- remove the group messaging, use the same msg when implemented -->
    <div id="grpMsg" class="msg">
    <h4>Group Messages</h4>
        <p id="grpMsgOutput" class="msgText">message 1 <br/> message 2</p>
        <form class="msgForm">
            <input type="text" id="grpMsgInput" class="msgInput"/>
            <input type="submit" class="msgSend" 
		   onclick="sendGroupMessage();" value="Send"/>
        </form>
    </div>
    <!-- there could be multiple ones, id's created with jQuery later -->
    <div id='indvMsg' class="msg">
    <h4>Player Messages</h4>
        <label id="recipientId" class="hiddenVariables"></label>
        <p id="indvMsgOutput" class="msgText">message 1 <br/> message 2</p>
        <form class="msgForm">
            <input type="text" id="indvMsgInput" class="msgInput"/>
            <input type="submit" class="msgSend" 
		   onclick="sendIndividualMessage();" value="Send"/>
        </form>
    </div>
</div>
